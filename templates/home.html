<!DOCTYPE html>
<head>
    <meta charset="utf-8"/>
    <title>DEEFFEST-SITE</title>
    <link rel="icon" type="image/x-icon" href="/static/logo.png?v=2"/>
    <link rel="stylesheet" type="text/css" href="/static/styles.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="yandex-verification" content="b84bc64d94f77f37"/>
    <meta name="google-site-verification" content="fe9W2dl5iljfkPkln9w3-ma9y2VQsbBhTbPcsR4wKoM"/>
</head>
<body>
    <main class="wrap" aria-label="Applications">
        {% for app in apps %}
        <article class="app-card">
            <h2 class="app-title">{{ app.title }}</h2>
            <p class="app-desc">{{ app.desc }}</p>
            <div class="meta">
                <span class="badge">{{ app.platforms }}</span>
                <span class="badge">{{ app.version }}</span>
            </div>
            <a class="button" href="{{ app.github }}">View on GitHub</a>
        </article>
        {% endfor %}
    </main>
</body>
</html>
